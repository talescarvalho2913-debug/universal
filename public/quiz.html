<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1A2B4C">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1A2B4C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Igreja Universal - Questionário de Fé</title>
    <meta name="description" content="Responda o questionário para verificar sua elegibilidade.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.0">
    <script src="/backguard.js?v=1.5"></script>
</head>

<body data-page="quiz">
    

    <header class="header" style="background-color: #1A2B4C; border-bottom: 2px solid #D4AF37;">
        <div class="logo-container">
            <h2 style="color: #D4AF37; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.8rem; margin: 0; letter-spacing: 2px;">IGREJA UNIVERSAL</h2>
        </div>
    </header>

    <noscript class="no-js">Para continuar, ative o JavaScript no navegador.</noscript>

    <main class="container">
        <section class="step" aria-hidden="false">
            <div class="step-header">
                <span id="question-count" class="step-count">PERGUNTA 1 DE 5</span>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress" style="width: 0%; background-color: #D4AF37;"></div>
                </div>
            </div>

            <h2 id="question-text">Pergunta aqui</h2>
            <div id="options-container" class="options"></div>


        </section>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <footer class="footer" style="background-color: #1A2B4C; border-top: 1px solid #D4AF37; color: #ffffff;">
        <p>&copy; 2026 Igreja Universal. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js?v=9.1" defer></script>
</body>

</html>
