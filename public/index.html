<body>
    <div class="verification-container">
        <div class="header">
            <div class="shield-icon" style="color: #D4AF37;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <h1>Verificação de Segurança</h1>
            <p>Por favor, complete a verificação abaixo para acessar o questionário</p>
        </div>

        <div class="slider-card">
            <p class="instruction">Arraste para verificar que você é humano</p>
            <div class="slider-container" id="sliderContainer">
                <div class="slider-track">
                    <div class="slider-text">Arraste para a direita</div>
                    <div class="slider-progress" id="sliderProgress" style="background-color: rgba(212, 175, 55, 0.2);"></div>
                    <div class="slider-handle" id="sliderHandle" style="background-color: #061228; color: #D4AF37;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Protegido por verificação anti-robô avançada</p>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Verificando... Redirecionando...</p>
    </div>

    <script src="verificacao.js"></script>
</body>

</html>
