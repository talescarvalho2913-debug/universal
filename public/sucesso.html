    <title>Igreja Universal - Resgate do Kit</title>
    <meta name="description" content="Seu perfil foi selecionado para escolher 1 item do resgate Universal: Kit Bíblico de Estudo, Kit Bíblico Premium ou Super Kit Família Cristã.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        body[data-page="success"] {
            background: linear-gradient(135deg, #1A2B4C 0%, #061228 100%) !important;
            font-family: 'Outfit', sans-serif;
            color: #2c3e50;
            min-height: 100vh;
        }
        body[data-page="success"] .step {
            background: #ffffff !important;
            border-radius: 24px !important;
            box-shadow: 0 15px 35px rgba(6, 18, 40, 0.08) !important;
            border-top: 4px solid #D4AF37 !important;
            padding: 36px 28px !important;
            margin-top: 40px !important;
        }
        body[data-page="success"] h1 {
            color: #1F1F1F !important;
        }
        body[data-page="success"] p {
            color: #4A4A4A !important;
        }
        @media (max-width: 768px) {
            .container {
                padding: 0 16px !important;
            }
            body[data-page="success"] .step {
                border-radius: 24px !important;
                margin-top: 16px !important;
                padding: 24px 20px !important;
            }
        }
    </style>

<body data-page="success">

    <header class="header" style="background-color: #061228; border-bottom: 2px solid #D4AF37; padding: 12px 16px;">
        <div class="logo-container" style="display: flex; justify-content: center; width: 100%;">
            <img src="/assets/logo-header.png" alt="Igreja Universal" style="max-height: 40px; width: auto; display: block; margin: 0 auto;">
        </div>
    </header>

    <noscript class="no-js">Para continuar, ative o JavaScript no navegador.</noscript>

    <main class="container">
        <section class="step" aria-hidden="false">
            <div class="badge-approved">APROVADO</div>
            <h1>Parab&eacute;ns, <span id="lead-name">parceiro</span>!</h1>
            <p>Seu perfil de fé foi selecionado com sucesso para receber o Kit Bíblico Oficial de forma 100% gratuita!</p>

            <div class="product-card success-offer-card">
                <div class="success-offer-grid" role="list" aria-label="Itens dispon&iacute;veis para resgate" style="display: flex; justify-content: center; width: 100%;">
                    <button class="success-reward-card" type="button" data-reward-id="bag" aria-pressed="false" style="max-width: 320px; width: 100%; border: 2px solid #1A2B4C; box-shadow: 0 0 25px rgba(26, 43, 76, 0.6); transform: scale(1.02); transition: all 0.3s ease;">
                        <span class="success-reward-media">
                            <img src="/assets/universal_bible_kit.png" alt="Kit Bíblico de Estudo" class="success-reward-image" loading="lazy" decoding="async">
                        </span>
                        <span class="success-reward-copy">
                            <span class="success-reward-title">Kit Bíblico de Estudo</span>
                            <span class="price-row">
                                <span class="old-price">R$ 100,00</span>
                                <span class="new-price">R$ 0,00</span>
                            </span>
                        </span>
                    </button>
                </div>
            </div>

            <div class="scarcity-box">
                <strong>Aten&ccedil;&atilde;o:</strong> finalize seu resgate agora antes que este lote promocional de doações encerre.
                <div style="margin-top: 8px; font-weight: 700; color: #d32f2f;">Expira em: <span id="timer">05:00</span></div>
            </div>

            <div class="action-stack">
                <button id="btn-checkout" class="btn-primary" type="button" disabled>Continuar Resgate</button>
            </div>
        </section>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <footer class="footer" style="background-color: #061228; border-top: 1px solid #D4AF37; color: #ffffff; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px 16px;">
        <img src="/assets/logo-header.png" alt="Igreja Universal" style="max-height: 24px; width: auto; display: block; margin: 0 auto;">
        <p style="margin: 0; font-size: 0.85rem; color: #a0aabf; text-align: center;">&copy; 2026 Igreja Universal. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js?v=10.1" defer></script>
</body>

</html>
