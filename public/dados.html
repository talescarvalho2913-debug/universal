    <title>Igreja Universal - Dados Pessoais</title>
    <meta name="description" content="Informe seus dados para continuar o resgate do Kit Bíblico da Igreja Universal.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* Estilos Premium para a Página de Dados Pessoais */
        body {
            background: linear-gradient(135deg, #1A2B4C 0%, #061228 100%);
            font-family: 'Outfit', sans-serif;
            color: #2c3e50;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 0 16px;
            box-sizing: border-box;
        }
        
        .step {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(6, 18, 40, 0.08);
            border-top: 4px solid #D4AF37;
            padding: 36px 28px;
            transition: all 0.3s ease;
        }
        
        .step-count {
            color: #061228;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        
        .progress-bar {
            background: #edf2f7;
            border-radius: 10px;
            height: 6px;
            margin-top: 6px;
            overflow: hidden;
        }
        
        .progress {
            background: linear-gradient(90deg, #061228 0%, #D4AF37 100%) !important;
            border-radius: 10px;
            height: 100%;
            transition: width 0.5s ease;
        }
        
        h2 {
            color: #061228;
            font-weight: 700;
            font-size: 1.6rem;
            margin-top: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        
        p {
            color: #5a738e;
            font-size: 0.95rem;
            line-height: 1.5;
            text-align: center;
            margin-bottom: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .floating-input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            color: #061228;
            background-color: #f8fafc;
            transition: all 0.25s ease;
            outline: none;
        }
        
        .floating-input:focus {
            border-color: #061228;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(6, 18, 40, 0.1);
        }
        
        .floating-label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: all 0.25s ease;
            pointer-events: none;
            background-color: transparent;
            padding: 0 4px;
            font-size: 1rem;
        }
        
        .floating-input:focus ~ .floating-label,
        .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: 0;
            font-size: 0.75rem;
            color: #061228;
            font-weight: 700;
            background-color: #ffffff;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #061228 0%, #0c234a 100%) !important;
            color: #ffffff !important;
            border: none !important;
            padding: 15px 24px !important;
            font-size: 1rem !important;
            font-weight: 700 !important;
            border-radius: 12px !important;
            width: 100% !important;
            cursor: pointer !important;
            box-shadow: 0 5px 15px rgba(6, 18, 40, 0.2) !important;
            transition: all 0.3s ease !important;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 18, 40, 0.3) !important;
            background: linear-gradient(135deg, #0c234a 0%, #123466 100%) !important;
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .form-error {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        
        .hidden {
            display: none !important;
        }
        @media (max-width: 768px) {
            .container {
                padding: 0 16px !important;
            }
            .step {
                border-radius: 24px !important;
            }
        }
    </style>

<body data-page="personal">
    

    <header class="header" style="background-color: #061228; border-bottom: 2px solid #D4AF37; padding: 12px 16px;">
        <div class="logo-container" style="display: flex; justify-content: center; width: 100%;">
            <img src="/assets/logo-header.png" alt="Igreja Universal" style="max-height: 40px; width: auto; display: block; margin: 0 auto;">
        </div>
    </header>

    <noscript class="no-js">Para continuar, ative o JavaScript no navegador.</noscript>

    <main class="container">
        <section class="step" aria-hidden="false">
            <div class="step-header">
                <span class="step-count">Seus Dados</span>
                <div class="progress-bar">
                    <div class="progress" style="width: 55%"></div>
                </div>
            </div>

            <h2>Dados de Identificação</h2>
            <p>Precisamos identificar você para vincular o seu Kit Bíblico ao seu CPF.</p>

            <div id="personal-error" class="form-error hidden" role="alert"></div>

            <form id="personal-form" class="data-form" novalidate>
                <div class="input-group">
                    <input type="text" id="fullname" class="floating-input" placeholder=" " required
                        autocomplete="name" spellcheck="false">
                    <label for="fullname" class="floating-label">Nome Completo</label>
                </div>

                <div class="input-group">
                    <input type="tel" id="cpf" class="floating-input" placeholder=" " maxlength="14" inputmode="numeric"
                        autocomplete="off" pattern="[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}" required>
                    <label for="cpf" class="floating-label">CPF</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" class="floating-input" placeholder=" " required autocomplete="email">
                    <label for="email" class="floating-label">E-mail</label>
                </div>

                <div class="input-group">
                    <input type="tel" id="phone" class="floating-input" placeholder=" " maxlength="15" inputmode="numeric"
                        autocomplete="tel" required>
                    <label for="phone" class="floating-label">Telefone</label>
                </div>

                <div class="input-group">
                    <input type="tel" id="birthdate" class="floating-input" placeholder=" " maxlength="10"
                        inputmode="numeric" autocomplete="bday" pattern="[0-9]{2}/[0-9]{2}/[0-9]{4}" required>
                    <label for="birthdate" class="floating-label">Data de Nascimento</label>
                </div>

                <div class="action-stack">
                    <button type="submit" class="btn-primary">Continuar</button>
                </div>
            </form>
        </section>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

            <img src="/assets/logo-header.png" alt="Igreja Universal" style="max-height: 24px; width: auto; display: block; margin: 0 auto;">
        <p style="margin: 0; font-size: 0.85rem; color: #a0aabf; text-align: center;">&copy; 2026 Igreja Universal. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js?v=10.1" defer></script>
</body>
